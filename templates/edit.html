<!DOCTYPE html>
<html>
<head>
    <title>Edit Skin Record</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: #FFE5D9;   /* Soft Peach Background */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        width: 400px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        background-color: hsl(0, 84%, 58%);  /* SAME as your edit button */
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: hsl(0, 84%, 58%);
    }
</style>
</head>
<body>

<div class="container">
    <h2>Edit Skin Record</h2>

    <form method="POST">
        <label>Date:</label>
        <input type="date" name="date" value="{{ record.date }}">

        <label>Pimples:</label>
        <input type="number" name="pimples" value="{{ record.pimples }}">

        <label>Cycle Day:</label>
        <input type="number" name="cycle_day" value="{{ record.cycle_day }}">

        <label>Sleep Hours:</label>
        <input type="number" name="sleep" value="{{ record.sleep_hours }}">

        <label>Water Glasses:</label>
        <input type="number" name="water" value="{{ record.water_glasses }}">

        <button type="submit">Update Record</button>
    </form>
</div>

</body>
</html>
