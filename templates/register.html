<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Skincare</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Montserrat', sans-serif;
        margin: 0;
    }

    .register-box {
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(10px);
        padding: 45px;
        border-radius: 18px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        width: 360px;
        text-align: center;
        transition: 0.3s ease;
    }

    .register-box:hover {
        transform: translateY(-3px);
    }

    h2 {
        margin-bottom: 30px;
        color: #ff4c4c;
        font-weight: 600;
    }

    input[type="text"], 
    input[type="email"], 
    input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 12px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus {
        outline: none;
        border-color: #ff6b6b;
        box-shadow: 0 0 8px rgba(255,107,107,0.3);
    }

    button {
        padding: 12px;
        background: linear-gradient(to right, #ff6b6b, #ff8787);
        border: none;
        color: white;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 20px;
        width: 100%;
        font-size: 16px;
        font-weight: 600;
        transition: 0.3s;
    }

    button:hover {
        opacity: 0.95;
        transform: scale(1.02);
    }

    p {
        margin-top: 15px;
        font-size: 14px;
    }

    a {
        color: #ff4c4c;
        text-decoration: none;
        font-weight: 500;
    }

    a:hover {
        text-decoration: underline;
    }

    .flash-message{
        color:red;
        font-size:14px;
        margin-bottom:15px;
    }
</style>

</head><body class="bg-register">
<div class="page-overlay"><div class="register-box">
    <h2>Create Account</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-message">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email address" pattern="[a-zA-Z0-9._%+\-]+@gmail\.com" title="Only @gmail.com emails are allowed!" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login">Login here</a></p>
</div>

</div>
</body>
</html>
