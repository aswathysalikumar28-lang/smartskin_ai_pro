<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfaf7;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #ff8c6a;
            color: white;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            padding: 50px;
        }

        .card-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 220px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .card h3 {
            margin: 10px 0;
            font-size: 18px;
            color: #555;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 30px;
            color: #ff8c6a;
        }

        .btn-container {
            margin-top: 40px;
            text-align: center;
        }

        .btn {
            padding: 12px 20px;
            background: #ff8c6a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin: 8px;
            display: inline-block;
            transition: 0.3s;
            font-size: 15px;
        }

        .btn:hover {
            background: #ff5a3c;
        }

        @media (max-width:768px){

            .container{
                padding:30px 20px;
            }

            .card{
                width:100%;
                max-width:280px;
            }

        }

    </style>
</head>

<body>

<div class="header">
    <h1>Your Dashboard</h1>
</div>

<div class="container">

    <div class="card-container">

        <div class="card">
            <h3>Total Entries</h3>
            <h2>{{ total_entries or 0 }}</h2>
        </div>

        <div class="card">
            <h3>Avg Sleep</h3>
            <h2>{{ avg_sleep or 0 }} hrs</h2>
        </div>

        <div class="card">
            <h3>Avg Water</h3>
            <h2>{{ avg_water or 0 }} L</h2>
        </div>

        <div class="card">
            <h3>Avg Pimples</h3>
            <h2>{{ avg_pimples or 0 }}</h2>
        </div>

    </div>

    <div class="btn-container">
        <a href="/skin_pattern" class="btn">Add Entry</a>
        <a href="/view_skin_data" class="btn">View Data</a>
        <a href="/" class="btn">Go Home</a>
    </div>

</div>

</body>
</html>
