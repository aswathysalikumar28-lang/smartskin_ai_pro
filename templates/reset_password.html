<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        /* RESET PASSWORD BACKGROUND IMAGE — FIXED PATH */
        body.bg {
            margin: 0;
            min-height: 100vh;
            background: url("/static/images/reset-password-bg.jpeg") no-repeat center center fixed;
            background-size: cover;
        }

        /* Extra styling for card layout if not in style.css */
        .card {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card input[type="text"],
        .card input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .card button {
            background-color: #ff8c6a;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        .card button:hover {
            background-color: #ff5a3c;
        }

        .flash-msg {
            color: green;
            font-weight: 600;
            margin-bottom: 15px;
        }
    </style>
</head>

<body class="bg">

<div class="card">
    <h2>Reset Password</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <p class="flash-msg">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% if not username %}
        <!-- Step 1: Enter Username -->
        <form method="POST">
            <input type="text" name="username" placeholder="Enter your username" required>
            <button type="submit">Confirm Username</button>
        </form>
    {% else %}
        <!-- Step 2: Enter New Password -->
        <p>Resetting password for: <strong>{{ username }}</strong></p>
        <form method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            <input type="password" name="password" placeholder="Enter new password" required>
            <button type="submit">Reset Password</button>
        </form>
    {% endif %}

    <br>
    <a href="/login"><button type="button"> Go to Login</button></a>
</div>

</body>
</html>
