<!DOCTYPE html>
<html>
<head>
<title>Skin Product Feedback</title>
<style>
body{
    font-family: Arial;
    background: #f3eeee url("{{ url_for('static', filename='images/feedback-bg.jpeg') }}") no-repeat center center fixed;
    background-size: cover;
    color: rgb(29, 13, 13);
    text-align: center;
    padding-top: 50px;
}

/* 🔥 Upgraded Glass Card */
.box{
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 35px;
    width: 420px;
    margin: auto;
    border-radius: 20px;
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
    animation: fadeIn 0.6s ease-in-out;
}

/* Smooth Fade Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

input, textarea, select{
    width: 90%;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.3s ease;
    font-size: 14px;
}

/* Focus Effect */
input:focus, textarea:focus, select:focus{
    border-color: #ed6767;
    box-shadow: 0 0 8px rgba(237, 103, 103, 0.3);
}

button{
    padding: 12px 20px;
    background: linear-gradient(to right, #ed6767, #f78c8c);
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    color: white;
    transition: 0.3s ease;
}

button:hover{
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(237, 103, 103, 0.3);
}

.success{
    color: green;
    margin-bottom: 15px;
    font-weight: bold;
}

/* Go Home button spacing */
.go-home{
    margin-top: 18px;
}
</style>
</head>

<body>
<div class="box">
<h2>🧴 Product Feedback After 1 Week</h2>

{% if success %}
<div class="success">✅ Thank you for the valuable feedback!</div>
{% endif %}

<form action="/submit_feedback" method="post">

<input type="text" name="product" placeholder="Product Name" required><br>

<select name="rating">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Bad</option>
</select><br>

<textarea name="comment" placeholder="Your experience..." rows="4"></textarea><br>

<button type="submit">Submit Feedback</button>

</form>

<div class="go-home">
    <a href="/"><button type="button"> Back To Home</button></a>
</div>

</div>
</body>
</html>
